name: "Bandit Security Scan"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Bandit
      run: pip install bandit

    # Scan code and generate a SARIF file to upload to the GitHub Security Tab
    # This automatically registers the results as native PR Checks.
    - name: Run Bandit Scan
      run: |
        bandit -r . -f sarif -o bandit-results.sarif || true
      # '|| true' ensures the step doesn't break prematurely, allowing the SARIF upload step to handle policy failure thresholds

    - name: Upload Bandit Scan Results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: bandit-results.sarif
        category: bandit